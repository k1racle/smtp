# Пример конфигурации вашего отдельного Nginx.
# Разместите файл на сервере с Nginx, например:
#   /etc/nginx/sites-available/mail-server
#   -> симлинк в sites-enabled
#
# Генерация самоподписанного сертификата:
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/mail-server.key \
#     -out /etc/nginx/ssl/mail-server.crt \
#     -subj "/CN=YOUR_SERVER_IP"

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Редирект HTTP -> HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS-прокси на Stalwart Web Admin (8080 на localhost)
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/mail-server.crt;
    ssl_certificate_key /etc/nginx/ssl/mail-server.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Размер тела запроса (для вложений, если позже добавите webmail)
    client_max_body_size 50M;

    location / {
        # Если в docker-compose.yml изменили ADMIN_PORT, укажите тот же порт.
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (может понадобиться WebUI)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400;
        proxy_redirect off;
    }
}
